name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v4.10.0)'
        required: true

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate version tag format
        shell: powershell
        run: |
          $tag = '${{ github.event.inputs.version }}'
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            Write-Error "Invalid version tag format: $tag (expected vX.Y.Z)"
            exit 1
          }

      - name: Validate script
        shell: powershell
        run: .\tools\Test-NetworkSecurityAudit.ps1

      - name: Verify version consistency
        shell: powershell
        run: |
          $tag = '${{ github.event.inputs.version }}'
          $expected = $tag.TrimStart('v')
          $content = Get-Content .\NetworkSecurityAudit.ps1 -Raw
          if ($content -notmatch "\`$script:ProductVersion\s*=\s*'$([regex]::Escape($expected))'") {
            Write-Error "ProductVersion in script does not match tag $tag"
            exit 1
          }

      - name: Generate checksum manifest
        shell: powershell
        run: |
          $hash = (Get-FileHash .\NetworkSecurityAudit.ps1 -Algorithm SHA256).Hash.ToLower()
          "$hash *NetworkSecurityAudit.ps1" | Out-File -FilePath SHA256SUMS.txt -Encoding utf8 -NoNewline

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.event.inputs.version }}" \
            NetworkSecurityAudit.ps1 \
            SHA256SUMS.txt \
            --title "${{ github.event.inputs.version }}" \
            --generate-notes

      - name: Attest release artifact
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: NetworkSecurityAudit.ps1
