name: .NET Build & Test

on:
  push:
    paths:
      - 'src/**'
      - 'tests/**'
      - '*.slnx'
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - '*.slnx'
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore NetworkSecurityAuditor.slnx

      - name: Build
        run: dotnet build NetworkSecurityAuditor.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test NetworkSecurityAuditor.slnx --no-build --configuration Release --verbosity normal
