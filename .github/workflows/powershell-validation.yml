name: PowerShell Validation

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    strategy:
      matrix:
        os: [windows-2022, windows-2025]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show environment
        shell: powershell
        run: |
          Write-Host "PS Edition : $($PSVersionTable.PSEdition)"
          Write-Host "PS Version : $($PSVersionTable.PSVersion)"
          Write-Host "OS         : $([System.Environment]::OSVersion.VersionString)"
          Write-Host "OS Build   : $((Get-CimInstance Win32_OperatingSystem).BuildNumber)"

      - name: Validate NetworkSecurityAudit
        shell: powershell
        run: .\tools\Test-NetworkSecurityAudit.ps1
